<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>КМ Сканер — Честный знак</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- SheetJS for XLSX export (loaded early, reliable CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
  onerror="this.onerror=null;this.src='https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'"></script>
<!-- fflate for ZIP (sync, preserves user gesture for Web Share API) -->
<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"
  onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/fflate/0.8.2/fflate.min.js'"></script>
<style>
:root {
  --bg:     #0a0f1e;
  --bg2:    #111827;
  --bg3:    #1a2235;
  --border: #1f2d45;
  --green:  #22c55e;
  --green2: #16a34a;
  --gold:   #f59e0b;
  --red:    #ef4444;
  --text:   #e2e8f0;
  --muted:  #64748b;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  display: flex; flex-direction: column;
}

/* ── TOP BAR ── */
#topbar {
  background: linear-gradient(135deg,#0d1b35,#1a2a4a);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tb-left { display:flex; align-items:center; gap:10px; }
.tb-icon {
  width:30px; height:30px; border-radius:8px;
  background: linear-gradient(135deg,var(--green),#059669);
  display:flex; align-items:center; justify-content:center; font-size:15px;
}
.tb-title { font-size:14px; font-weight:700; color:#f1f5f9; }
.tb-sub   { font-size:10px; color:var(--muted); }
#badge {
  background: var(--bg3); border:1px solid var(--border);
  border-radius:16px; padding:5px 16px;
  font-size:22px; font-weight:800; color:var(--muted);
  transition: all .3s; min-width:72px; text-align:center;
  line-height:1.2;
}
#badge .badge-unit { font-size:11px; font-weight:500; opacity:.7; display:block; }
#badge.on { background:linear-gradient(135deg,#14532d,#166534); border-color:#22c55e77; color:#86efac; }

/* ── SCANNER AREA (big, ~62% of screen) ── */
#scanner-wrap {
  flex: none;
  /* height set via JS in setCamHeight() to bypass html5-qrcode overrides */
  position: relative;
  background: #000;
  overflow: hidden;
  min-height: 240px;
}

/* html5-qrcode injects its own video — we style the container */
#qr-reader {
  width: 100% !important;
  height: 100% !important;
  border: none !important;
  background: #000 !important;
}
/* Hide html5-qrcode's own UI chrome */
#qr-reader > img,
#qr-reader__dashboard_section_csr,
#qr-reader__dashboard_section_csr span,
#qr-reader__status_span,
#qr-reader__dashboard,
#qr-reader__dashboard_section_swaplink { display:none !important; }
#qr-reader video {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover !important;
  position: absolute !important;
  top: 0 !important; left: 0 !important;
}
#qr-reader canvas {
  display: none !important;
}

/* Scan frame overlay */
#scan-overlay {
  position:absolute; inset:0; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
}
.s-frame {
  width: 60%; aspect-ratio:1/1; position:relative;
}
.s-frame::before,.s-frame::after,.s-frame i::before,.s-frame i::after {
  content:''; position:absolute; width:24px; height:24px;
  border-color:var(--green); border-style:solid; border-radius:3px;
}
.s-frame::before  { top:0;    left:0;  border-width:3px 0 0 3px; }
.s-frame::after   { top:0;    right:0; border-width:3px 3px 0 0; }
.s-frame i::before{ bottom:0; left:0;  border-width:0 0 3px 3px; }
.s-frame i::after { bottom:0; right:0; border-width:0 3px 3px 0; }
@keyframes sline { 0%{top:2%}90%{top:98%}100%{top:98%,opacity:0} }
.s-line {
  position:absolute; left:3%; right:3%; height:2px; top:0;
  background:linear-gradient(90deg,transparent,var(--green),transparent);
  animation: sline 2s ease-in-out infinite;
}
@keyframes flash-anim { from{opacity:.5} to{opacity:0} }
#flash {
  position:absolute; inset:0; pointer-events:none;
  background:var(--green); opacity:0;
}
#flash.go { animation: flash-anim .25s ease-out forwards; }

/* Status below frame */
#stat-bar {
  position:absolute; bottom:0; left:0; right:0;
  background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
  padding:7px 14px; display:flex; align-items:center; gap:8px;
}
#stat-dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; }
#stat-dot.ok    { background:var(--green);  box-shadow:0 0 8px var(--green); }
#stat-dot.dup   { background:var(--gold); }
#stat-dot.err   { background:var(--red); }
#stat-dot.scan  { background:var(--green); animation:blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
#stat-txt { font-size:11px; color:#cbd5e1; flex:1; }

/* ── CONTROLS ── */
#ctrl {
  flex-shrink:0;
  background:var(--bg2); padding:8px 12px;
  display:flex; gap:8px; align-items:center;
  border-bottom:1px solid var(--border);
}
#cam-sel {
  flex:1; background:var(--bg3); color:var(--text);
  border:1px solid var(--border); border-radius:8px;
  padding:7px 10px; font-size:12px; font-family:inherit;
}
.cbtn {
  padding:8px 14px; border:none; border-radius:8px;
  font-size:12px; font-weight:600; cursor:pointer; font-family:inherit;
}
#btn-go   { background:linear-gradient(135deg,var(--green),var(--green2)); color:#fff; }
#btn-stop { background:var(--bg3); color:var(--muted); border:1px solid var(--border); }

/* ── LIST (scrollable, rest of space) ── */
#list-wrap {
  flex: 1 1 0;
  display: flex; flex-direction: column;
  min-height: 0; /* important for flex scroll child */
}
#list-head {
  flex-shrink:0;
  background:var(--bg2); padding:7px 14px;
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid var(--border);
}
#list-cnt  { font-size:11px; color:var(--muted); font-weight:500; }
#btn-clr {
  padding:4px 10px; background:transparent; color:#f87171;
  border:1px solid #f8717155; border-radius:6px; font-size:11px; cursor:pointer; font-family:inherit;
}
#code-list {
  flex:1; overflow-y:auto; overscroll-behavior:contain;
  padding-bottom:80px;
}
.ci {
  padding:9px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:9px; background:var(--bg);
}
.ci:nth-child(even){ background:var(--bg2); }
@keyframes ci-in { from{transform:translateX(-8px);opacity:0} to{transform:none;opacity:1} }
.ci.new { animation:ci-in .35s ease-out; }
.ci-n { color:var(--muted); font-size:11px; min-width:20px; font-weight:600; }
.ci-info { flex:1; overflow:hidden; }
.ci-code { font-family:monospace; font-size:10px; color:#86efac; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ci-meta { font-size:9px; color:var(--muted); margin-top:2px; }
.ci-type { font-size:9px; padding:1px 5px; border-radius:3px; font-weight:600; }
.ci-type.std   { background:#14532d; color:#86efac; }
.ci-type.short { background:#713f12; color:#fef08a; }
.ci-del { color:#ef444466; font-size:20px; cursor:pointer; padding:0 4px; }
.ci-del:active { color:var(--red); }
#empty {
  padding:32px 20px; text-align:center; color:var(--muted);
}
.ei { font-size:36px; margin-bottom:8px; opacity:.4; }

/* ── EXPORT ── */
#exp-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:linear-gradient(180deg,transparent,var(--bg2) 40%);
  padding:8px 14px 14px;
  display:flex; gap:8px; flex-direction:column;
}
#exp-row { display:flex; gap:8px; }
#btn-exp {
  flex:1; padding:13px; border:none; border-radius:12px;
  background:linear-gradient(135deg,#166534,#15803d);
  color:#fff; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;
  box-shadow:0 4px 20px rgba(22,163,74,.3);
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:transform .15s;
}
#btn-exp:active { transform:scale(.97); }
#btn-exp:disabled { background:var(--bg3); color:var(--muted); box-shadow:none; cursor:not-allowed; }
#btn-xlsx {
  flex:1; padding:13px; border:none; border-radius:12px;
  background:linear-gradient(135deg,#1e3a5f,#1d4ed8);
  color:#fff; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;
  box-shadow:0 4px 20px rgba(29,78,216,.3);
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:transform .15s;
}
#btn-xlsx:active { transform:scale(.97); }
#btn-xlsx:disabled { background:var(--bg3); color:var(--muted); box-shadow:none; cursor:not-allowed; }
.exp-sub { font-size:9px; font-weight:400; opacity:.7; display:block; }
/* share icon buttons */
.btn-shr {
  padding:13px 14px; border:none; border-radius:12px;
  font-size:16px; cursor:pointer; font-family:inherit;
  background:linear-gradient(135deg,#4a1d96,#7c3aed);
  box-shadow:0 2px 12px rgba(124,58,237,.3);
  transition:transform .15s; flex-shrink:0;
}
.btn-shr:active { transform:scale(.95); }
.btn-shr:disabled { background:var(--bg3); box-shadow:none; cursor:not-allowed; filter:grayscale(1); }

#toast {
  position:fixed; top:64px; left:50%; transform:translateX(-50%) translateY(-16px);
  background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  padding:9px 18px; font-size:13px; opacity:0; pointer-events:none;
  transition:all .25s; z-index:999; white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
#toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="tb-left">
    <div class="tb-icon">🏷️</div>
    <div><div class="tb-title">КМ Сканер</div><div class="tb-sub">Честный знак → CSV</div></div>
  </div>
  <div id="badge"><span id="badge-num">0</span><span class="badge-unit">шт</span></div>
</div>

<!-- SCANNER -->
<div id="scanner-wrap">
  <div id="qr-reader"></div>
  <div id="scan-overlay"><div class="s-frame"><i></i><div class="s-line"></div></div></div>
  <div id="flash"></div>
  <div id="stat-bar">
    <div id="stat-dot"></div>
    <div id="stat-txt">Нажмите «Старт»</div>
  </div>
</div>

<!-- CONTROLS -->
<div id="ctrl">
  <select id="cam-sel"><option value="">📷 Камера...</option></select>
  <button class="cbtn" id="btn-go"   onclick="startScan()">▶ Старт</button>
  <button class="cbtn" id="btn-stop" onclick="stopScan()">⏹</button>
</div>

<!-- LIST -->
<div id="list-wrap">
  <div id="list-head">
    <span id="list-cnt">Список пуст</span>
    <button id="btn-clr" onclick="clearAll()">🗑 Очистить</button>
  </div>
  <div id="code-list">
    <div id="empty"><div class="ei">📷</div><p>Коды появятся здесь</p></div>
  </div>
</div>

<!-- EXPORT -->
<div id="exp-bar">
  <div id="exp-row">
    <button id="btn-exp" onclick="dlCSV()" disabled>
      ⬇️ CSV <span class="exp-sub">отчёт о нанесении</span>
    </button>
    <button class="btn-shr" id="btn-shr-csv" onclick="shareCSV()" disabled title="Поделиться CSV">📤</button>
  </div>
  <div id="exp-row">
    <button id="btn-xlsx" onclick="dlXLSX()" disabled>
      📊 XLSX <span class="exp-sub">ввод в оборот</span>
    </button>
    <button class="btn-shr" id="btn-shr-xlsx" onclick="shareXLSX()" disabled title="Поделиться XLSX">📤</button>
    <button class="btn-shr" id="btn-shr-zip" onclick="shareZIP()" disabled title="Поделиться ZIP (CSV+XLSX)">🗂️</button>
  </div>
  <div id="exp-row">
    <button id="btn-yadisk" onclick="uploadYaDisk()" disabled
      style="background:linear-gradient(135deg,#1a1a2e,#e53935);box-shadow:0 4px 20px rgba(229,57,53,.3);">
      ☁️ Яндекс.Диск <span class="exp-sub" id="yadisk-sub">не подключён</span>
    </button>
    <button class="btn-shr" onclick="yadiskLogin()" title="Подключить Я.Disk" style="background:linear-gradient(135deg,#7f1d1d,#b91c1c);box-shadow:0 2px 12px rgba(185,28,28,.3);">🔑</button>
  </div>
</div>

<div id="toast"></div>

<!-- html5-qrcode: лучше читает DataMatrix на мобильных -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
const GS = '\u001d';
let codes = [];
let scanner = null;
let scanning = false;
let lastRaw = '';
let lastTime = 0;
const COOLDOWN = 2500;

// ── Camera list ───────────────────────────────────────────────
async function initCams() {
  try {
    const devices = await Html5Qrcode.getCameras();
    const sel = document.getElementById('cam-sel');
    sel.innerHTML = '';
    if (!devices || devices.length === 0) {
      sel.innerHTML = '<option>Камера не найдена</option>';
      return;
    }
    let backIdx = 0;
    devices.forEach((d, i) => {
      const o = document.createElement('option');
      o.value = d.id;
      o.textContent = d.label || `Камера ${i+1}`;
      if (/back|rear|environment|задн/i.test(d.label)) backIdx = i;
      sel.appendChild(o);
    });
    sel.selectedIndex = backIdx;
    // auto-start on mobile
    if (/Android|iPhone|iPad/i.test(navigator.userAgent)) startScan();
  } catch(e) {
    setStat('Ошибка камеры: ' + e.message, 'err');
  }
}

// ── Start scanning ────────────────────────────────────────────
async function startScan() {
  if (scanning) return;
  const camId = document.getElementById('cam-sel').value;
  if (!camId) { setStat('Выберите камеру', 'err'); return; }

  try {
    scanner = new Html5Qrcode('qr-reader', { verbose: false });

    const config = {
      fps: 15,
      // No fixed qrbox — let it use the full viewfinder
      aspectRatio: 1.0,
      formatsToSupport: [
        Html5QrcodeSupportedFormats.DATA_MATRIX,
        Html5QrcodeSupportedFormats.QR_CODE,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.EAN_13,
      ],
    };

    await scanner.start(camId, config, onScanSuccess, onScanError);
    scanning = true;
    setStat('Наводите камеру на DataMatrix...', 'scan');
    document.getElementById('btn-go').style.opacity = '.4';
    // Force correct sizing after html5-qrcode injects its DOM
    setTimeout(fixCamSize, 100);
    setTimeout(fixCamSize, 500);
  } catch(e) {
    setStat('Ошибка: ' + e, 'err');
  }
}

function onScanSuccess(decoded) {
  const now = Date.now();
  if (decoded === lastRaw && now - lastTime < COOLDOWN) return;
  lastRaw = decoded;
  lastTime = now;
  handleCode(decoded);
}

function onScanError() { /* ignore per-frame errors */ }

function fixCamSize() {
  // html5-qrcode sets explicit height on its inner div — override it
  const wrap = document.getElementById('scanner-wrap');
  const inner = document.querySelector('#qr-reader > div');
  if (inner) {
    inner.style.cssText = 'width:100%!important;height:100%!important;padding:0!important;border:none!important;';
  }
  const video = document.querySelector('#qr-reader video');
  if (video) {
    video.style.cssText = 'width:100%!important;height:100%!important;object-fit:cover!important;position:absolute!important;top:0!important;left:0!important;';
  }
}

// ── Stop ──────────────────────────────────────────────────────
async function stopScan() {
  if (scanner && scanning) {
    try { await scanner.stop(); } catch(e) {}
  }
  scanning = false;
  setStat('Остановлено', '');
  document.getElementById('btn-go').style.opacity = '1';
}

// ── Code processing ───────────────────────────────────────────
function handleCode(raw) {
  // Normalize textual GS variants
  let code = raw
    .replace(/<GS>/g,   GS)
    .replace(/\[GS\]/g, GS)
    .replace(/\\x1d/gi, GS)
    .replace(/\\u001d/gi, GS);

  // Strip GS1 symbology prefixes (]d2, ]C1, FNC1 chars, etc.)
  code = code
    .replace(/^\]d[0-9]/,  '')
    .replace(/^\]C[0-9]/,  '')
    .replace(/^\]e[0-9]/,  '')
    .replace(/^[^\d(]+/,   '');  // strip any non-digit/non-paren leading chars

  // Must start with 01 + 14-digit GTIN
  const m = code.match(/^01(\d{14})/);
  if (!m) {
    // Show what we actually read — useful for debugging
    const preview = raw.slice(0, 24).replace(new RegExp(GS,'g'),'[GS]');
    setStat(`❓ Читаю: "${preview}"`, 'err');
    return;
  }

  // Duplicate check
  if (codes.some(c => c.raw === code)) {
    setStat('⚠️ Дубль — уже в списке', 'dup');
    vibrate([80, 40, 80]);
    beep('dup');
    return;
  }

  const gtin = m[1];
  const rest  = code.slice(18);
  const gsPos = rest.indexOf(GS);
  const serial = rest.slice(0, gsPos > 0 ? gsPos : undefined);
  const type  = code.includes(GS+'91') ? 'std'
              : code.includes(GS+'93') ? 'short'
              : 'unk';

  codes.push({ raw: code, gtin, serial, type });
  setStat(`✅ #${codes.length} GTIN: ${gtin}`, 'ok');
  vibrate([200]);
  beep('ok');
  doFlash();
  renderList();
}

// ── UI ────────────────────────────────────────────────────────
function setStat(msg, cls) {
  document.getElementById('stat-txt').textContent = msg;
  document.getElementById('stat-dot').className = cls || '';
}
function vibrate(p) { navigator.vibrate?.(p); }

// Beep via Web Audio API — no files needed, works offline
let audioCtx = null;
function beep(type = 'ok') {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = audioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'ok') {
      // Короткий "бип" как у сканера: 880Hz → 1100Hz
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(1100, ctx.currentTime + 0.06);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.type = 'square';
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.15);
    } else if (type === 'dup') {
      // Двойной низкий — дубль
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.type = 'square';
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    }
  } catch(e) { /* AudioContext недоступен — молчим */ }
}

function doFlash() {
  const el = document.getElementById('flash');
  el.classList.remove('go');
  void el.offsetWidth;
  el.classList.add('go');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2200);
}

// ── Render list ───────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('code-list');
  const badge = document.getElementById('badge');
  const cnt   = document.getElementById('list-cnt');
  const btnE  = document.getElementById('btn-exp');
  const n = codes.length;

  document.getElementById('badge-num').textContent = n;
  document.getElementById('badge').className = n > 0 ? 'on' : '';
  cnt.textContent  = n > 0 ? `Кодов: ${n}` : 'Список пуст';
  btnE.disabled    = n === 0;
  document.getElementById('btn-xlsx').disabled    = n === 0;
  document.getElementById('btn-shr-csv').disabled  = n === 0;
  document.getElementById('btn-shr-xlsx').disabled = n === 0;
  document.getElementById('btn-shr-zip').disabled  = n === 0;

  if (n === 0) {
    list.innerHTML = '<div id="empty"><div class="ei">📷</div><p>Коды появятся здесь</p></div>';
    return;
  }

  const typeMap = { std:'std', short:'short', unk:'unk' };
  list.innerHTML = codes.map((c, i) => {
    const disp  = c.raw.replace(new RegExp(GS,'g'), '[GS]');
    const short = disp.length > 44 ? disp.slice(0,41) + '…' : disp;
    const tl    = c.type === 'std'   ? '<span class="ci-type std">91/92</span>'
                : c.type === 'short' ? '<span class="ci-type short">93</span>'
                : '<span class="ci-type unk">?</span>';
    const isNew = i === codes.length - 1;
    return `<div class="ci${isNew?' new':''}">
      <span class="ci-n">${i+1}</span>
      <div class="ci-info">
        <div class="ci-code" title="${disp}">${short}</div>
        <div class="ci-meta">GTIN: ${c.gtin} &nbsp;${tl}</div>
      </div>
      <span class="ci-del" onclick="delCode(${i})">×</span>
    </div>`;
  }).join('');

  list.lastElementChild?.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function delCode(i) {
  codes.splice(i, 1);
  renderList();
  toast('Код удалён');
}

function clearAll() {
  if (!codes.length) return;
  if (!confirm(`Удалить все ${codes.length} кодов?`)) return;
  codes = []; lastRaw = '';
  renderList();
  toast('Список очищен');
}

// ── Export ────────────────────────────────────────────────────
function dlCSV() {
  if (!codes.length) return;
  const content = codes.map(c => c.raw).join('\n') + '\n';
  const blob = new Blob([new TextEncoder().encode(content)], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.download = `km_codes_${codes.length}шт_${new Date().toISOString().slice(0,10)}.csv`;
  a.href = URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`✅ CSV скачан (${codes.length} кодов)`);
}

function dlXLSX() {
  if (!codes.length) return;
  if (typeof XLSX === 'undefined') { toast('⏳ SheetJS загружается, повторите...'); return; }

  // For "Ввод в оборот" portal only needs: 01 + GTIN(14) + 21 + SERIAL (no GS, no crypto)
  // Format: 01{gtin}21{serial}  — truncated code without verification part
  const rows = codes.map(c => {
    const shortCode = '01' + c.gtin + '21' + c.serial;
    return [shortCode];
  });

  const ws = XLSX.utils.aoa_to_sheet([
    ['Код маркировки'],  // header
    ...rows
  ]);

  // Set column width
  ws['!cols'] = [{ wch: 36 }];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Коды');

  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `km_vvod_${codes.length}шт_${date}.xlsx`);
  toast(`✅ XLSX скачан (${codes.length} кодов)`);
}

function _makeCSVFile(n, date) {
  const content = codes.map(c => c.raw).join('\n') + '\n';
  const blob = new Blob([new TextEncoder().encode(content)], {type:'text/plain'});
  return new File([blob], `km_codes_${n}шт_${date}.csv`, {type:'text/plain'});
}

function _makeXLSXFile(n, date) {
  if (typeof XLSX === 'undefined') return null;
  const rows = codes.map(c => ['01' + c.gtin + '21' + c.serial]);
  const ws = XLSX.utils.aoa_to_sheet([['Код маркировки'], ...rows]);
  ws['!cols'] = [{ wch: 36 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Коды');
  const arr = XLSX.write(wb, {bookType:'xlsx', type:'array'});
  const blob = new Blob([arr], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  return new File([blob], `km_vvod_${n}шт_${date}.xlsx`,
    {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
}

function _tryShare(file, fallbackFn) {
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ title: file.name, files: [file] })
      .then(() => toast('✅ Отправлено!'))
      .catch(e => { if (e.name !== 'AbortError') fallbackFn(); });
  } else if (navigator.share) {
    // Share as text fallback
    const shortCodes = codes.map(c => '01' + c.gtin + '21' + c.serial).join('\n');
    navigator.share({ title: file.name, text: shortCodes })
      .then(() => toast('✅ Отправлено как текст'))
      .catch(e => { if (e.name !== 'AbortError') fallbackFn(); });
  } else {
    fallbackFn();
  }
}

function shareCSV() {
  if (!codes.length) return;
  const date = new Date().toISOString().slice(0,10);
  const file = _makeCSVFile(codes.length, date);
  _tryShare(file, dlCSV);
}

function shareXLSX() {
  if (!codes.length) return;
  const date = new Date().toISOString().slice(0,10);
  const file = _makeXLSXFile(codes.length, date);
  if (!file) { toast('⏳ SheetJS ещё загружается, повторите...'); return; }
  _tryShare(file, dlXLSX);
}

// ZIP both files and share — ZIP is allowed by Web Share API unlike xlsx
function shareZIP() {
  if (!codes.length) return;
  if (typeof fflate === 'undefined') { toast('⏳ fflate загружается, повторите...'); return; }
  const date = new Date().toISOString().slice(0,10);
  const n = codes.length;

  // Build CSV bytes
  const csvContent = codes.map(c => c.raw).join('\n') + '\n';
  const csvBytes = new TextEncoder().encode(csvContent);

  // Build XLSX bytes
  let xlsxBytes = null;
  if (typeof XLSX !== 'undefined') {
    const rows = codes.map(c => ['01' + c.gtin + '21' + c.serial]);
    const ws = XLSX.utils.aoa_to_sheet([['Код маркировки'], ...rows]);
    ws['!cols'] = [{ wch: 36 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Коды');
    const arr = XLSX.write(wb, {bookType:'xlsx', type:'array'});
    xlsxBytes = new Uint8Array(arr);
  }

  // Pack into ZIP synchronously (fflate.zipSync is sync = user gesture preserved)
  const zipEntries = {};
  zipEntries[`km_codes_${n}шт_${date}.csv`] = csvBytes;
  if (xlsxBytes) zipEntries[`km_vvod_${n}шт_${date}.xlsx`] = xlsxBytes;
  const zipped = fflate.zipSync(zipEntries, { level: 6 });

  const blob = new Blob([zipped], { type: 'application/zip' });
  const file = new File([blob], `km_${n}шт_${date}.zip`, { type: 'application/zip' });

  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ title: `КМ коды ${n}шт — CSV+XLSX`, files: [file] })
      .then(() => toast('✅ ZIP отправлен!'))
      .catch(e => { if (e.name !== 'AbortError') _dlZip(blob, file.name); });
  } else {
    _dlZip(blob, file.name);
  }
}

function _dlZip(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('✅ ZIP скачан!');
}

// ── Yandex Disk ─────────────────────────────────────────────────
const YA_CLIENT = '3583350714d54c69a084a370e643b079';
const YA_FOLDER = 'disk:/Честный знак/КМ коды'; // можно сменить

function yadiskLogin() {
  const url = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${YA_CLIENT}`;
  window.location.href = url;
}

function getYaToken() { return localStorage.getItem('ya_token'); }

function updateYaDiskUI() {
  const token = getYaToken();
  const sub = document.getElementById('yadisk-sub');
  const btn = document.getElementById('btn-yadisk');
  if (token) {
    sub.textContent = 'отправить CSV+XLSX';
    btn.disabled = codes.length === 0;
  } else {
    sub.textContent = 'не подключён';
    btn.disabled = true;
  }
}

async function yadiskUploadFile(token, path, blob) {
  // Step 1: get upload URL
  const r1 = await fetch(
    `https://cloud-api.yandex.net/v1/disk/resources/upload?path=${encodeURIComponent(path)}&overwrite=true`,
    { headers: { Authorization: `OAuth ${token}` } }
  );
  if (!r1.ok) throw new Error(`Ошибка получения URL: ${r1.status}`);
  const { href } = await r1.json();

  // Step 2: upload
  const r2 = await fetch(href, { method: 'PUT', body: blob });
  if (!r2.ok) throw new Error(`Ошибка загрузки: ${r2.status}`);
}

async function uploadYaDisk() {
  const token = getYaToken();
  if (!token) { yadiskLogin(); return; }
  if (!codes.length) return;

  const date = new Date().toISOString().slice(0,10);
  const n = codes.length;

  toast('☁️ Загружаю на Яндекс.Диск...');
  document.getElementById('btn-yadisk').disabled = true;

  try {
    // Upload CSV
    const csvContent = codes.map(c => c.raw).join('\n') + '\n';
    const csvBlob = new Blob([new TextEncoder().encode(csvContent)], {type:'text/plain'});
    await yadiskUploadFile(token, `${YA_FOLDER}/km_codes_${n}шт_${date}.csv`, csvBlob);

    // Upload XLSX
    if (typeof XLSX !== 'undefined') {
      const rows = codes.map(c => ['01' + c.gtin + '21' + c.serial]);
      const ws = XLSX.utils.aoa_to_sheet([['Код маркировки'], ...rows]);
      ws['!cols'] = [{ wch: 36 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Коды');
      const arr = XLSX.write(wb, {bookType:'xlsx', type:'array'});
      const xlsxBlob = new Blob([arr], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      await yadiskUploadFile(token, `${YA_FOLDER}/km_vvod_${n}шт_${date}.xlsx`, xlsxBlob);
    }

    toast(`✅ Загружено на ЯДиск! ${YA_FOLDER}`);
  } catch(e) {
    console.error(e);
    if (e.message.includes('401')) {
      localStorage.removeItem('ya_token');
      updateYaDiskUI();
      toast('Токен устарел — нажми 🔑 для повторного входа');
    } else {
      toast('Ошибка: ' + e.message);
    }
  } finally {
    updateYaDiskUI();
  }
}

// Auto-capture OAuth token from URL hash after Yandex redirect
(function checkYaToken() {
  const hash = window.location.hash;
  const m = hash.match(/access_token=([^&]+)/);
  if (m) {
    localStorage.setItem('ya_token', m[1]);
    // Clean URL
    history.replaceState(null, '', window.location.pathname);
    toast('✅ Яндекс.Диск подключён!');
  }
  updateYaDiskUI();
})();

initCams();
renderList();
